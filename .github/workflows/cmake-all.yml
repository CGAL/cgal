name: CMake Testsuite

on: [push, pull_request, workflow_dispatch]

permissions:
  contents: read

jobs:
  cmake-testsuite:
    if: github.repository == 'CGAL/cgal' || github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: install dependencies
      run: sudo apt-get install -y libboost-dev libboost-program-options-dev libmpfr-dev libeigen3-dev
    - name: configure all
      run: |
        set -e
        mkdir build && cd build && CXX=clang++ cmake -DWITH_examples=ON -DWITH_tests=ON -DWITH_demos=ON -DCGAL_ENABLE_TESTING=ON ..
        ctest -L Installation -j $(getconf _NPROCESSORS_ONLN)

  cmake-testsuite-with-qt:
    if: github.repository == 'CGAL/cgal' || github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: install dependencies
      run: sudo bash -e .github/install.sh
    - name: configure all
      run: |
        set -e
        mkdir build && cd build && CXX=clang++ cmake -DWITH_examples=ON -DWITH_tests=ON -DWITH_demos=ON -DCGAL_ENABLE_TESTING=ON ..
        ctest -L Installation -j $(getconf _NPROCESSORS_ONLN)

  cmake-quiet:
    if: github.repository == 'CGAL/cgal' || github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: install dependencies
      run: sudo apt-get install -y libboost-dev libboost-program-options-dev libmpfr-dev libeigen3-dev
    - name: ensure find_package quiet mode is honored
      run: |
        set -e
        cmake -DCMAKE_INSTALL_PREFIX=/tmp/install -DCMAKE_BUILD_TYPE=Release -B build .
        cmake --build build --target install
        mkdir quiet && cd quiet
        echo -e "cmake_minimum_required(VERSION 3.18)\nproject(quiet)\nfind_package(CGAL CONFIG REQUIRED QUIET)\n" > CMakeLists.txt
        cmake -DCGAL_DIR=/tmp/install/lib/cmake/CGAL -DCMAKE_BUILD_TYPE=Release . | tee stdout.txt
        test "$(wc -l < stdout.txt)" -le 20
